<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scribe Titan</title>
    
    <!-- PWA & Apple OS Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844721.png">
    
    <!-- Core External Dependencies -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.5.1/mammoth.browser.min.js"></script>

    <style>
        :root {
            --bg: #050505; --surface: #111111; --surface-light: #1e1e1e;
            --accent: #1db954; --text: #ffffff; --text-dim: #888;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
        }

        /* Ambient background glow mapping */
        #ambient-glow {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.05) 0%, transparent 70%);
            z-index: -1; pointer-events: none; transition: background-color 1s ease;
        }

        header { 
            padding: calc(var(--safe-top) + 15px) 20px 10px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        
        h1 { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; }

        #app { 
            flex: 1; overflow-y: auto; padding: 0 20px 180px; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .search-box { 
            background: var(--surface); border-radius: 14px; padding: 12px 16px;
            display: flex; align-items: center; gap: 10px; margin: 10px 0 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        #search-input { background: none; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
        
        .card { 
            background: var(--surface); border-radius: 20px; padding: 14px;
            transition: 0.3s var(--spring); position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }
        
        .card:active { transform: scale(0.96); background: #1a1a1a; }
        
        .card-cover { 
            aspect-ratio: 1; background: linear-gradient(135deg, #1e1e1e, #050505);
            border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 36px; color: var(--accent);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        .title { font-weight: 700; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .delete-trigger { 
            position: absolute; top: 6px; right: 6px; color: #ff4444; opacity: 0.6; 
            background: none; border: none; cursor: pointer; padding: 4px; z-index: 10;
        }

        /* Full Player Overlay and responsive control layers */
        #player { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; 
            padding: calc(var(--safe-top) + 20px) 24px calc(var(--safe-bottom) + 20px);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.3, 1, 0.2, 1);
        }
        
        #player.active { display: flex; transform: translateY(0); }

        .viz-area { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; overflow: hidden; margin-bottom: 20px;
        }
        
        #live-caption { 
            font-size: clamp(22px, 6.5vw, 36px); font-weight: 800; 
            text-align: center; line-height: 1.4; color: var(--text-dim); 
            width: 100%; max-height: 100%; overflow-y: auto; padding: 10px;
        }
        
        .active-word { color: #fff; text-shadow: 0 0 30px var(--accent); }

        /* Control UI Engine Elements */
        .hud { 
            background: var(--surface); border-radius: 28px; padding: 22px; 
            display: flex; flex-direction: column; gap: 18px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        
        .progress-wrap { height: 6px; background: #222; border-radius: 3px; position: relative; overflow: hidden; }
        
        #progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; transition: 0.15s linear; }
        
        .main-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        
        .btn:active { transform: scale(0.9); opacity: 0.7; }
        
        .btn-play { font-size: 76px; color: #fff; }
        
        .btn-skip { font-size: 32px; color: var(--text-dim); }

        /* Mini Player (Bottom Docked) */
        .mini { 
            position: fixed; bottom: calc(var(--safe-bottom) + 15px); left: 15px; right: 15px; 
            height: 72px; background: rgba(20,20,20,0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 20px; display: none; align-items: center; padding: 0 15px; 
            z-index: 1000; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 16px 36px rgba(0,0,0,0.6);
        }

        .fab { 
            position: fixed; bottom: calc(var(--safe-bottom) + 100px); right: 20px; 
            width: 64px; height: 64px; border-radius: 32px; background: var(--accent); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 500;
        }

        /* Loading Overlay Layer */
        #loading-engine { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; 
        }
        
        .pulse { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="ambient-glow"></div>

    <div id="loading-engine">
        <div class="pulse"></div>
        <p style="font-weight: 900; letter-spacing: 2px; color: var(--accent); font-size: 14px;">TITAN ENGINE LOADING</p>
    </div>

    <header>
        <h1>SCRIBE <span style="color: var(--accent);">TITAN</span></h1>
        <div style="display: flex; gap: 15px;">
            <button class="btn" style="font-size: 24px;" onclick="App.export()"><i class="ph ph-cloud-arrow-up"></i></button>
            <button class="btn" style="font-size: 24px; color: #ff4444;" onclick="App.clear()"><i class="ph ph-trash"></i></button>
        </div>
    </header>

    <div id="app">
        <div class="search-box">
            <i class="ph ph-magnifying-glass" style="color: #666; font-size: 18px;"></i>
            <input type="text" id="search-input" placeholder="Search physical archive...">
        </div>
        <div class="grid" id="library"></div>
    </div>

    <!-- Mini player module mirroring Beam architecture -->
    <div class="mini" id="mini-player" onclick="UI.toggleFull(true)">
        <div style="width: 44px; height: 44px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px;">
            <i class="ph-fill ph-waveform" style="color: #000; font-size: 24px;"></i>
        </div>
        <div style="flex: 1; overflow: hidden;">
            <div id="mini-title" style="font-weight: 800; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Offline Sync Ready</div>
            <div id="mini-status" style="font-size: 11px; color: var(--text-dim);">Background Daemon Off</div>
        </div>
        <button class="btn" id="mini-play-btn" onclick="event.stopPropagation(); Engine.toggle();" style="padding: 10px;">
            <i class="ph-fill ph-play" style="font-size: 28px; color: var(--accent);"></i>
        </button>
    </div>

    <!-- Full player panel -->
    <div id="player">
        <header style="padding: 0; margin-bottom: 20px;">
            <button class="btn" style="font-size: 32px;" onclick="UI.toggleFull(false)"><i class="ph ph-caret-down"></i></button>
            <div style="text-align: center; max-width: 60%;">
                <p id="player-book-title" style="font-weight: 900; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
                <div style="display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 2px;">
                    <span id="player-pos-text" style="font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 1px;">SENTENCE 0</span>
                </div>
            </div>
            <button class="btn" style="font-size: 24px;" onclick="UI.sleepTimer()"><i class="ph ph-moon"></i></button>
        </header>

        <div class="viz-area" id="gesture-surface">
            <div id="live-caption">Ready for processing</div>
        </div>

        <div class="hud">
            <div class="progress-wrap">
                <div id="progress-fill"></div>
            </div>

            <div class="main-controls">
                <button class="btn btn-skip" onclick="Engine.skip(-5)"><i class="ph-fill ph-rewind-circle"></i></button>
                <button class="btn" style="font-size: 40px;" onclick="Engine.prev()"><i class="ph-fill ph-skip-back-circle"></i></button>
                <button class="btn btn-play" id="play-btn" onclick="Engine.toggle()"><i class="ph-fill ph-play-circle"></i></button>
                <button class="btn" style="font-size: 40px;" onclick="Engine.next()"><i class="ph-fill ph-skip-forward-circle"></i></button>
                <button class="btn btn-skip" onclick="Engine.skip(5)"><i class="ph-fill ph-fast-forward-circle"></i></button>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                <div style="display: flex; gap: 10px; align-items: center; width: 65%;">
                    <i class="ph-fill ph-speaker-high" style="color: var(--accent); font-size: 18px;"></i>
                    <select id="voice-select" style="background: none; border: none; color: #fff; font-weight: 700; font-size: 12px; outline: none; width: 100%;"></select>
                </div>
                <button class="btn" onclick="Engine.cycleTempo()" style="font-weight: 900; color: var(--accent); border: 1px solid #222; padding: 6px 14px; border-radius: 12px; font-size: 13px;">
                    <span id="tempo-ui">1.0x</span>
                </button>
            </div>
        </div>
    </div>

    <div class="fab" onclick="document.getElementById('file-in').click()">
        <i class="ph ph-plus"></i>
    </div>

    <input type="file" id="file-in" hidden accept=".pdf,.docx,.txt">

<script>
/**
 * TITAN ENGINE v4.0 — ARCHITECTURE BY BIMO
 */

const State = {
    lib: [],
    active: null,
    playing: false,
    sentences: [],
    cursor: 0,
    tempo: 1.0,
    voices: []
};

/**
 * BACKGROUND AUDIO PERSISTENCE LAYER
 * Locks priority of execution thread for OS Lockscreen and background play state.
 */
const BackgroundEngine = {
    audio: null,
    silentURI: 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==',

    init: () => {
        BackgroundEngine.audio = new Audio(BackgroundEngine.silentURI);
        BackgroundEngine.audio.loop = true;
        
        // Touch interaction is mandatory on iOS Safari to initialize Audio engine context.
        const unlock = () => {
            BackgroundEngine.audio.play().then(() => {
                console.log("⚡ Background Keep-Alive Daemon Activated");
            }).catch(e => console.warn("Waiting for browser user gesture...", e));
            
            document.removeEventListener('touchstart', unlock);
            document.removeEventListener('click', unlock);
        };

        document.addEventListener('touchstart', unlock);
        document.addEventListener('click', unlock);
        
        BackgroundEngine.setupMediaControls();
    },

    setupMediaControls: () => {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => Engine.toggle());
            navigator.mediaSession.setActionHandler('pause', () => Engine.toggle());
            navigator.mediaSession.setActionHandler('nexttrack', () => Engine.next());
            navigator.mediaSession.setActionHandler('previoustrack', () => Engine.prev());
            
            // Standard seek logic matching Spotify audio control panels
            try { navigator.mediaSession.setActionHandler('seekforward', () => Engine.skip(5)); } catch(e){}
            try { navigator.mediaSession.setActionHandler('seekbackward', () => Engine.skip(-5)); } catch(e){}
        }
    },

    syncLockScreen: (title, progress) => {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: 'Scribe Titan Engine',
                album: `Sentence ${progress}`,
                artwork: [
                    { src: 'https://cdn-icons-png.flaticon.com/512/3844/3844721.png', sizes: '512x512', type: 'image/png' }
                ]
            });
            navigator.mediaSession.playbackState = State.playing ? 'playing' : 'paused';
        }
    }
};

const App = {
    init: async () => {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        // Restore Local database records
        State.lib = await localforage.getItem('scribe_v4_db') || [];
        UI.refreshLib();

        document.getElementById('file-in').onchange = (e) => App.ingest(e.target.files[0]);
        document.getElementById('search-input').oninput = (e) => UI.refreshLib(e.target.value);
        
        // Web Speech Synth registration
        window.speechSynthesis.onvoiceschanged = () => {
            State.voices = window.speechSynthesis.getVoices();
            UI.populateVoices();
        };

        BackgroundEngine.init();
        UI.bindGestures();
    },

    ingest: async (file) => {
        if(!file) return;
        document.getElementById('loading-engine').style.display = 'flex';
        let content = "";

        try {
            if(file.type === "application/pdf") {
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(buffer).promise;
                for(let i = 1; i <= pdf.numPages; i++){
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    content += textContent.items.map(s => s.str).join(" ") + " ";
                }
            } else if(file.name.endsWith('.docx')) {
                const buffer = await file.arrayBuffer();
                const res = await mammoth.extractRawText({arrayBuffer: buffer});
                content = res.value;
            } else {
                content = await file.text();
            }

            const doc = {
                id: Date.now(),
                title: file.name.replace(/\.[^/.]+$/, ""),
                text: content,
                cursor: 0
            };

            State.lib.unshift(doc);
            await localforage.setItem('scribe_v4_db', State.lib);
            UI.refreshLib();
        } catch (err) {
            alert("Parser Interruption: Ingest process collapsed under resource constraint.");
        } finally {
            document.getElementById('loading-engine').style.display = 'none';
        }
    },

    delete: async (id, e) => {
        e.stopPropagation();
        Haptics.feedback();
        if(!confirm("Purge selected record from client database?")) return;
        State.lib = State.lib.filter(d => d.id !== id);
        await localforage.setItem('scribe_v4_db', State.lib);
        UI.refreshLib();
    },

    export: async () => {
        const data = JSON.stringify(State.lib);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `scribe_titan_db_${Date.now()}.json`;
        a.click();
    },

    clear: async () => {
        Haptics.feedback();
        if(confirm("ALERT: Delete all indexed document segments inside database?")) {
            await localforage.clear();
            location.reload();
        }
    }
};

const Engine = {
    load: (id) => {
        const doc = State.lib.find(d => d.id === id);
        if(!doc) return;
        State.active = doc;
        
        // High Performance context boundary separator
        State.sentences = doc.text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [doc.text];
        State.cursor = doc.cursor || 0;
        
        UI.toggleFull(true);
        Engine.play();
    },

    play: () => {
        window.speechSynthesis.cancel();
        if(State.cursor >= State.sentences.length) {
            State.playing = false;
            UI.updatePlayer();
            return;
        }

        const rawText = State.sentences[State.cursor].trim();
        if(!rawText) { State.cursor++; Engine.play(); return; }

        const utterance = new SpeechSynthesisUtterance(rawText);
        utterance.voice = State.voices[document.getElementById('voice-select').value] || State.voices[0];
        utterance.rate = State.tempo;

        utterance.onboundary = (e) => {
            if(e.name === 'word') UI.syncCaption(rawText, e.charIndex, e.charLength);
        };

        utterance.onend = () => {
            if(State.playing) {
                State.cursor++;
                Engine.persist();
                Engine.play();
            }
        };

        // Keep OS active audio thread priority during lock states
        if (BackgroundEngine.audio && BackgroundEngine.audio.paused) {
            BackgroundEngine.audio.play().catch(() => {});
        }

        window.speechSynthesis.speak(utterance);
        State.playing = true;
        UI.updatePlayer();
        BackgroundEngine.syncLockScreen(State.active.title, State.cursor);
    },

    toggle: () => {
        Haptics.feedback();
        if(State.playing) {
            window.speechSynthesis.pause();
            if (BackgroundEngine.audio) BackgroundEngine.audio.pause();
            State.playing = false;
        } else {
            if (window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
            } else {
                Engine.play();
            }
            if (BackgroundEngine.audio) BackgroundEngine.audio.play().catch(() => {});
            State.playing = true;
        }
        UI.updatePlayer();
        if (State.active) {
            BackgroundEngine.syncLockScreen(State.active.title, State.cursor);
        }
    },

    next: () => { 
        Haptics.feedback();
        State.cursor = Math.min(State.sentences.length - 1, State.cursor + 1); 
        Engine.play(); 
    },
    
    prev: () => { 
        Haptics.feedback();
        State.cursor = Math.max(0, State.cursor - 1); 
        Engine.play(); 
    },
    
    skip: (n) => { 
        Haptics.feedback();
        State.cursor = Math.max(0, Math.min(State.sentences.length - 1, State.cursor + n)); 
        Engine.play(); 
    },
    
    cycleTempo: () => {
        Haptics.feedback();
        const rates = [1.0, 1.25, 1.5, 2.0, 0.8];
        State.tempo = rates[(rates.indexOf(State.tempo) + 1) % rates.length];
        document.getElementById('tempo-ui').textContent = State.tempo + 'x';
        if(State.playing) Engine.play();
    },

    persist: async () => {
        const idx = State.lib.findIndex(d => d.id === State.active.id);
        if(idx !== -1) {
            State.lib[idx].cursor = State.cursor;
            await localforage.setItem('scribe_v4_db', State.lib);
        }
    }
};

const UI = {
    refreshLib: (query = "") => {
        const grid = document.getElementById('library');
        const filter = State.lib.filter(d => d.title.toLowerCase().includes(query.toLowerCase()));
        
        grid.innerHTML = filter.map(doc => `
            <div class="card" onclick="Engine.load(${doc.id})">
                <button class="delete-trigger" onclick="App.delete(${doc.id}, event)"><i class="ph-bold ph-trash"></i></button>
                <div class="card-cover"><i class="ph-fill ph-book-open"></i></div>
                <div class="title">${doc.title}</div>
            </div>
        `).join('');
    },

    populateVoices: () => {
        const sel = document.getElementById('voice-select');
        // Filter readable voice paths to prevent display overflow in UI HUD select
        sel.innerHTML = State.voices
            .map((v, i) => `<option value="${i}">${v.name.split(' (')[0]}</option>`)
            .join('');
    },

    syncCaption: (text, start, len) => {
        const pre = text.substring(0, start);
        const word = text.substring(start, start + len);
        const post = text.substring(start + len);
        document.getElementById('live-caption').innerHTML = `${pre}<span class="active-word">${word}</span>${post}`;
    },

    updatePlayer: () => {
        const i = State.playing ? 'ph-fill ph-pause-circle' : 'ph-fill ph-play-circle';
        const mi = State.playing ? 'ph-fill ph-pause' : 'ph-fill ph-play';
        document.getElementById('play-btn').innerHTML = `<i class="${i}"></i>`;
        document.getElementById('mini-play-btn').innerHTML = `<i class="${mi}"></i>`;
        
        const pct = Math.round((State.cursor / State.sentences.length) * 100) || 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('player-pos-text').textContent = `SENTENCE ${State.cursor} • ${pct}%`;
        
        document.getElementById('mini-title').textContent = State.active?.title || 'System Standby';
        document.getElementById('mini-status').textContent = State.playing ? 'Synthesizing...' : 'Paused';
        document.getElementById('player-book-title').textContent = State.active?.title;
    },

    toggleFull: (show) => {
        Haptics.feedback();
        const p = document.getElementById('player');
        const m = document.getElementById('mini-player');
        if(show) {
            p.style.display = 'flex';
            setTimeout(() => p.classList.add('active'), 10);
            m.style.display = 'none';
        } else {
            p.classList.remove('active');
            setTimeout(() => { p.style.display = 'none'; m.style.display = 'flex'; }, 400);
        }
    },

    bindGestures: () => {
        let startY = 0;
        const area = document.getElementById('gesture-surface');
        area.addEventListener('touchstart', e => startY = e.touches[0].clientY, {passive: true});
        area.addEventListener('touchend', e => {
            const endY = e.changedTouches[0].clientY;
            if(endY - startY > 100) UI.toggleFull(false);
        }, {passive: true});
    },

    sleepTimer: () => {
        Haptics.feedback();
        const mins = prompt("SLEEP SCHEDULER: Define countdown minutes:", "30");
        if(mins && !isNaN(mins)) {
            setTimeout(() => {
                window.speechSynthesis.cancel();
                if (BackgroundEngine.audio) BackgroundEngine.audio.pause();
                State.playing = false;
                UI.updatePlayer();
                if (State.active) {
                    BackgroundEngine.syncLockScreen(State.active.title, State.cursor);
                }
            }, mins * 60000);
        }
    }
};

const Haptics = {
    feedback: () => { if(navigator.vibrate) navigator.vibrate(10); }
};

// Injection of Service Worker for completely offline architecture
if('serviceWorker' in navigator) {
    const sw = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));`;
    const blob = new Blob([sw], {type: 'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}

App.init();
</script>
</body>
</html>
