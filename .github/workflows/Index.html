<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribe | Audiobooks & Podcasts</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.5.1/mammoth.browser.min.js"></script>
    <style>
        :root {
            --bg: #080808; --surface: #121212; --accent: #1db954;
            --text: #ffffff; --text-dim: #b3b3b3;
            --radius: 12px; --safe-top: env(safe-area-inset-top, 20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }

        /* Sidebar/Nav Mockup */
        header { padding: calc(var(--safe-top) + 20px) 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 24px; font-weight: 900; letter-spacing: -1px; }

        #app { height: calc(100vh - 180px); overflow-y: auto; padding: 10px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .book-card { background: var(--surface); padding: 12px; border-radius: var(--radius); cursor: pointer; transition: 0.2s; position: relative; }
        .book-card:active { transform: scale(0.97); }
        .book-cover { aspect-ratio: 1; background: linear-gradient(135deg, #282828, #121212); border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--accent); }
        .book-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-author { font-size: 12px; color: var(--text-dim); }

        /* Full Player Overlay */
        #player-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; padding: 40px 24px; transition: transform 0.4s cubic-bezier(0.32, 1, 0.23, 1); transform: translateY(100%); }
        #player-overlay.active { display: flex; transform: translateY(0); }

        /* Live Captions */
        .caption-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .caption-text { font-size: 28px; font-weight: 800; line-height: 1.3; color: var(--text-dim); transition: 0.2s; }
        .caption-text .active-word { color: var(--accent); text-shadow: 0 0 20px rgba(29, 185, 84, 0.4); }

        /* Controls */
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 40px; }
        .btn-ctrl { background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }
        .btn-play { font-size: 64px; color: var(--accent); }
        
        .progress-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 20px; position: relative; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        /* Import Section */
        .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 90; }

        #drop-zone { position: fixed; inset: 0; background: rgba(29, 185, 84, 0.2); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; border: 4px dashed var(--accent); }
        
        .mini-player { position: fixed; bottom: 20px; left: 10px; right: 10px; height: 64px; background: var(--surface); border-radius: 12px; display: none; align-items: center; padding: 0 12px; z-index: 500; }
    </style>
</head>
<body>

    <header>
        <h1>Scribe</h1>
        <div style="display:flex; gap:15px;">
            <button class="btn-ctrl" onclick="App.toggleSettings()"><i class="ph ph-sliders"></i></button>
        </div>
    </header>

    <div id="app">
        <div class="grid" id="library-grid">
            <!-- Books injected here -->
        </div>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="file-input" hidden accept=".pdf,.docx,.txt">

    <!-- Mini Player -->
    <div class="mini-player" id="mini-player" onclick="UI.openFullPlayer()">
        <div id="mini-info" style="flex:1;">
            <div id="mini-title" style="font-weight:700; font-size:14px;">Nothing Playing</div>
            <div id="mini-pos" style="font-size:11px; color:var(--text-dim);">0% completed</div>
        </div>
        <button class="btn-ctrl" id="mini-play-btn" onclick="event.stopPropagation(); Engine.toggle();">
            <i class="ph-fill ph-play"></i>
        </button>
    </div>

    <!-- Full Player -->
    <div id="player-overlay">
        <button class="btn-ctrl" onclick="UI.closeFullPlayer()"><i class="ph ph-caret-down"></i></button>
        
        <div class="caption-container">
            <div id="live-caption" class="caption-text">Select a book to start listening...</div>
        </div>

        <div class="progress-wrap">
            <div id="progress-bar"></div>
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="Engine.seek(-1)"><i class="ph-fill ph-rewind-five"></i></button>
            <button class="btn-ctrl btn-play" id="main-play-btn" onclick="Engine.toggle()"><i class="ph-fill ph-play-circle"></i></button>
            <button class="btn-ctrl" onclick="Engine.seek(1)"><i class="ph-fill ph-fast-forward-five"></i></button>
        </div>

        <div style="display:flex; justify-content: space-around; padding-bottom: 20px;">
            <select id="voice-select" style="background:var(--surface); color:#fff; border:none; padding:8px; border-radius:8px;"></select>
            <button class="btn-ctrl" style="font-size:20px;" onclick="Engine.changeRate()"><span id="rate-label">1.0x</span></button>
        </div>
    </div>

    <div class="fab" onclick="document.getElementById('file-input').click()">
        <i class="ph ph-plus"></i>
    </div>

    <div id="drop-zone"><h1>Drop to Import</h1></div>

<script>
/**
 * SCRIBE CORE ENGINE
 * Bimo's Logic Implementation
 */

const State = {
    library: [],
    currentBook: null,
    isPlaying: false,
    utterance: null,
    sentences: [],
    cursor: 0,
    rate: 1.0,
    selectedVoice: null
};

const App = {
    init: async () => {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        // Load library
        const saved = await localforage.getItem('scribe_lib');
        if(saved) State.library = saved;
        
        UI.renderLibrary();
        UI.loadVoices();

        // Bind File Inputs
        document.getElementById('file-input').onchange = (e) => App.import(e.target.files[0]);
        
        // Drag & Drop
        window.ondragover = (e) => { e.preventDefault(); document.getElementById('drop-zone').style.display = 'flex'; };
        document.getElementById('drop-zone').ondragleave = () => document.getElementById('drop-zone').style.display = 'none';
        document.getElementById('drop-zone').ondrop = (e) => {
            e.preventDefault();
            document.getElementById('drop-zone').style.display = 'none';
            App.import(e.dataTransfer.files[0]);
        };

        window.speechSynthesis.onvoiceschanged = UI.loadVoices;
    },

    import: async (file) => {
        if(!file) return;
        let text = "";
        const id = 'book_' + Date.now();

        if(file.type === "application/pdf") {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(" ") + " ";
            }
        } else if(file.name.endsWith('.docx')) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({arrayBuffer});
            text = result.value;
        } else {
            text = await file.text();
        }

        const newBook = {
            id,
            title: file.name.replace(/\.[^/.]+$/, ""),
            content: text,
            cursor: 0,
            added: Date.now()
        };

        State.library.push(newBook);
        await localforage.setItem('scribe_lib', State.library);
        UI.renderLibrary();
    }
};

const Engine = {
    load: (bookId) => {
        const book = State.library.find(b => b.id === bookId);
        if(!book) return;
        
        State.currentBook = book;
        // Split by punctuation but keep it for grammar pauses
        State.sentences = book.content.match(/[^.!?]+[.!?]+/g) || [book.content];
        State.cursor = book.cursor || 0;
        
        UI.openFullPlayer();
        Engine.play();
    },

    play: () => {
        window.speechSynthesis.cancel();
        if(State.cursor >= State.sentences.length) return;

        const text = State.sentences[State.cursor];
        const ut = new SpeechSynthesisUtterance(text);
        
        // Settings
        const voices = window.speechSynthesis.getVoices();
        ut.voice = voices[document.getElementById('voice-select').value] || voices[0];
        ut.rate = State.rate;
        ut.pitch = 1;

        // Visual Tracking
        ut.onboundary = (event) => {
            if (event.name === 'word') {
                UI.highlightWord(text, event.charIndex, event.charLength);
            }
        };

        ut.onend = () => {
            if(State.isPlaying) {
                State.cursor++;
                Engine.saveProgress();
                Engine.play();
            }
        };

        State.utterance = ut;
        State.isPlaying = true;
        window.speechSynthesis.speak(ut);
        UI.updatePlayState(true);
    },

    toggle: () => {
        if(State.isPlaying) {
            window.speechSynthesis.pause();
            State.isPlaying = false;
        } else {
            if(window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
            } else {
                Engine.play();
            }
            State.isPlaying = true;
        }
        UI.updatePlayState(State.isPlaying);
    },

    seek: (dir) => {
        State.cursor = Math.max(0, Math.min(State.sentences.length - 1, State.cursor + dir));
        Engine.play();
    },

    changeRate: () => {
        const rates = [1.0, 1.25, 1.5, 2.0, 0.75];
        let idx = rates.indexOf(State.rate);
        State.rate = rates[(idx + 1) % rates.length];
        document.getElementById('rate-label').textContent = State.rate + 'x';
        if(State.isPlaying) Engine.play();
    },

    saveProgress: async () => {
        const idx = State.library.findIndex(b => b.id === State.currentBook.id);
        if(idx !== -1) {
            State.library[idx].cursor = State.cursor;
            await localforage.setItem('scribe_lib', State.library);
            UI.updateProgress();
        }
    }
};

const UI = {
    renderLibrary: () => {
        const grid = document.getElementById('library-grid');
        grid.innerHTML = State.library.map(book => `
            <div class="book-card" onclick="Engine.load('${book.id}')">
                <div class="book-cover"><i class="ph-fill ph-book-open"></i></div>
                <div class="book-title">${book.title}</div>
                <div class="book-author">Local Document</div>
            </div>
        `).join('');
    },

    loadVoices: () => {
        const sel = document.getElementById('voice-select');
        const voices = window.speechSynthesis.getVoices();
        sel.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name} (${v.lang})</option>`).join('');
    },

    highlightWord: (text, charIndex, charLength) => {
        const before = text.substring(0, charIndex);
        const word = text.substring(charIndex, charIndex + charLength);
        const after = text.substring(charIndex + charLength);
        document.getElementById('live-caption').innerHTML = `${before}<span class="active-word">${word}</span>${after}`;
    },

    updatePlayState: (playing) => {
        const icon = playing ? 'ph-fill ph-pause-circle' : 'ph-fill ph-play-circle';
        const mIcon = playing ? 'ph-fill ph-pause' : 'ph-fill ph-play';
        document.getElementById('main-play-btn').innerHTML = `<i class="${icon}"></i>`;
        document.getElementById('mini-play-btn').innerHTML = `<i class="${mIcon}"></i>`;
    },

    updateProgress: () => {
        const p = (State.cursor / State.sentences.length) * 100;
        document.getElementById('progress-bar').style.width = p + '%';
        document.getElementById('mini-pos').textContent = Math.round(p) + '% completed';
    },

    openFullPlayer: () => {
        document.getElementById('player-overlay').classList.add('active');
        document.getElementById('mini-player').style.display = 'none';
        document.getElementById('mini-title').textContent = State.currentBook.title;
    },

    closeFullPlayer: () => {
        document.getElementById('player-overlay').classList.remove('active');
        document.getElementById('mini-player').style.display = 'flex';
    }
};

App.init();
</script>
</body>
</html>
