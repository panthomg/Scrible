<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scribe Titan</title>
    
    <!-- PWA & iOS Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844721.png">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.5.1/mammoth.browser.min.js"></script>

    <style>
        :root {
            --bg: #050505; --surface: #121212; --surface-light: #1e1e1e;
            --accent: #1db954; --text: #ffffff; --text-dim: #b3b3b3;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
        }

        /* Layout Architecture */
        header { 
            padding: calc(var(--safe-top) + 15px) 20px 10px; 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        h1 { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; }

        #app { 
            flex: 1; overflow-y: auto; padding: 0 20px 150px; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        /* UI Components */
        .search-container { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; }
        #search-input { 
            width: 100%; padding: 14px; border-radius: 12px; 
            background: var(--surface); border: 1px solid #222; color: #fff; 
            font-size: 16px; outline: none;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-top: 10px; }
        .card { 
            background: var(--surface); padding: 12px; border-radius: var(--radius); 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
        }
        .card:active { transform: scale(0.95); }
        .cover { 
            aspect-ratio: 1; background: linear-gradient(145deg, #1e1e1e, #000); 
            border-radius: 12px; margin-bottom: 10px; display: flex; 
            align-items: center; justify-content: center; font-size: 40px; color: var(--accent);
        }
        .title { font-weight: 700; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .delete-trigger { position: absolute; top: 6px; right: 6px; color: #ff4444; opacity: 0.6; }

        /* Full Player Overlay */
        #player { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: none; flex-direction: column; 
            padding: calc(var(--safe-top) + 20px) 24px var(--safe-bottom);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.3, 1, 0.2, 1);
        }
        #player.active { display: flex; transform: translateY(0); }

        .caption-area { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            text-align: center; padding: 40px 0;
        }
        .caption-text { 
            font-size: clamp(24px, 6vw, 36px); font-weight: 800; 
            line-height: 1.4; color: var(--text-dim);
        }
        .active-word { color: var(--accent); text-shadow: 0 0 20px rgba(29, 185, 84, 0.4); }

        /* Controls */
        .progress-bar-container { margin-bottom: 30px; }
        .bar-track { width: 100%; height: 6px; background: #222; border-radius: 3px; position: relative; }
        #bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; }

        .main-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-skip { font-size: 32px; color: var(--text-dim); }
        .btn-play { font-size: 80px; }
        .btn-nav { font-size: 40px; }

        .settings-tray { 
            background: var(--surface); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; color: var(--text-dim); }
        select { background: none; border: none; color: var(--accent); font-weight: 800; font-size: 14px; outline: none; }

        /* Mini Player */
        .mini { 
            position: fixed; bottom: calc(var(--safe-bottom) + 15px); left: 15px; right: 15px; 
            height: 70px; background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(20px); 
            border-radius: 16px; display: none; align-items: center; padding: 0 15px; 
            z-index: 1000; border: 1px solid rgba(255,255,255,0.08);
        }

        .fab { 
            position: fixed; bottom: calc(var(--safe-bottom) + 100px); right: 20px; 
            width: 64px; height: 64px; border-radius: 32px; background: var(--accent); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 500;
        }

        #loader { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 5000; display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-weight: 800; letter-spacing: 1px;">PROCESSING TITAN DATA</p>
    </div>

    <header>
        <h1>SCRIBE <span style="color: var(--accent);">TITAN</span></h1>
        <div style="display: flex; gap: 15px;">
            <button class="btn" style="font-size: 24px;" onclick="App.export()"><i class="ph ph-share-network"></i></button>
            <button class="btn" style="font-size: 24px; color: #ff4444;" onclick="App.clear()"><i class="ph ph-trash"></i></button>
        </div>
    </header>

    <div id="app">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search your archive...">
        </div>
        <div class="grid" id="library"></div>
    </div>

    <div class="mini" id="mini-player" onclick="UI.togglePlayer(true)">
        <div style="width: 44px; height: 44px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px;">
            <i class="ph-fill ph-waveform" style="color: #000; font-size: 24px;"></i>
        </div>
        <div style="flex: 1; overflow: hidden;">
            <div id="mini-title" style="font-weight: 800; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nothing Loaded</div>
            <div id="mini-status" style="font-size: 11px; color: var(--text-dim);">Ready for synthesis</div>
        </div>
        <button class="btn" id="mini-play-btn" onclick="event.stopPropagation(); Engine.toggle();">
            <i class="ph-fill ph-play" style="font-size: 28px;"></i>
        </button>
    </div>

    <div id="player">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn" style="font-size: 32px;" onclick="UI.togglePlayer(false)"><i class="ph ph-caret-down"></i></button>
            <div style="text-align: center;">
                <p id="player-title" style="font-weight: 800; font-size: 14px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
                <p style="font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 2px;">SYNTHESIZING</p>
            </div>
            <button class="btn" style="font-size: 24px;" onclick="UI.sleepTimer()"><i class="ph ph-moon"></i></button>
        </div>

        <div class="caption-area" id="swipe-area">
            <div id="live-caption" class="caption-text">Start your session</div>
        </div>

        <div class="progress-bar-container">
            <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; font-weight: 700; color: var(--text-dim);">
                <span id="pos-index">Sentence 0</span>
                <span id="pos-percent">0%</span>
            </div>
            <div class="bar-track">
                <div id="bar-fill"></div>
            </div>
        </div>

        <div class="main-controls">
            <button class="btn btn-skip" onclick="Engine.skip(-5)"><i class="ph-fill ph-rewind-circle"></i></button>
            <button class="btn btn-nav" onclick="Engine.prev()"><i class="ph-fill ph-skip-back-circle"></i></button>
            <button class="btn btn-play" id="play-btn" onclick="Engine.toggle()"><i class="ph-fill ph-play-circle"></i></button>
            <button class="btn btn-nav" onclick="Engine.next()"><i class="ph-fill ph-skip-forward-circle"></i></button>
            <button class="btn btn-skip" onclick="Engine.skip(5)"><i class="ph-fill ph-fast-forward-circle"></i></button>
        </div>

        <div class="settings-tray">
            <div class="setting-row">
                <span>VOICE ARCHITECTURE</span>
                <select id="voice-select"></select>
            </div>
            <div class="setting-row">
                <span>TEMPO CONTROL</span>
                <button class="btn" style="color: var(--accent); font-weight: 800;" onclick="Engine.tempo()"><span id="rate-ui">1.0x</span></button>
            </div>
        </div>
    </div>

    <div class="fab" onclick="document.getElementById('file-in').click()">
        <i class="ph ph-plus"></i>
    </div>

    <input type="file" id="file-in" hidden accept=".pdf,.docx,.txt">

<script>
/**
 * SCRIBE TITAN v3.0
 * Bimo's Optimized Engine
 */

const State = {
    lib: [],
    curr: null,
    playing: false,
    sentences: [],
    cursor: 0,
    tempo: 1.0,
    voices: []
};

const App = {
    init: async () => {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        State.lib = await localforage.getItem('titan_archive') || [];
        UI.render();

        document.getElementById('file-in').onchange = (e) => App.ingest(e.target.files[0]);
        document.getElementById('search-input').oninput = (e) => UI.render(e.target.value);
        
        window.speechSynthesis.onvoiceschanged = () => {
            State.voices = window.speechSynthesis.getVoices();
            UI.setupVoices();
        };

        // iOS Control Center Integration
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => Engine.toggle());
            navigator.mediaSession.setActionHandler('pause', () => Engine.toggle());
            navigator.mediaSession.setActionHandler('previoustrack', () => Engine.prev());
            navigator.mediaSession.setActionHandler('nexttrack', () => Engine.next());
        }

        UI.bindGestures();
    },

    ingest: async (file) => {
        if(!file) return;
        document.getElementById('loader').style.display = 'flex';
        let text = "";

        try {
            if(file.type === "application/pdf") {
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(buffer).promise;
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + " ";
                }
            } else if(file.name.endsWith('.docx')) {
                const buffer = await file.arrayBuffer();
                const res = await mammoth.extractRawText({arrayBuffer: buffer});
                text = res.value;
            } else {
                text = await file.text();
            }

            const doc = {
                id: Date.now(),
                title: file.name.replace(/\.[^/.]+$/, ""),
                content: text,
                cursor: 0
            };

            State.lib.unshift(doc);
            await localforage.setItem('titan_archive', State.lib);
            UI.render();
        } catch (err) {
            console.error("Ingest failure", err);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    },

    delete: async (id, e) => {
        e.stopPropagation();
        Haptics.impact();
        if(!confirm("Erase from archive?")) return;
        State.lib = State.lib.filter(d => d.id !== id);
        await localforage.setItem('titan_archive', State.lib);
        UI.render();
    },

    clear: async () => {
        if(confirm("PERMANENT DATA PURGE?")) {
            await localforage.clear();
            location.reload();
        }
    },

    export: () => {
        const data = JSON.stringify(State.lib);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `titan_backup_${Date.now()}.json`;
        a.click();
    }
};

const Engine = {
    load: (id) => {
        const doc = State.lib.find(d => d.id === id);
        State.curr = doc;
        // High-performance grammar splitting
        State.sentences = doc.content.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [doc.content];
        State.cursor = doc.cursor || 0;
        UI.togglePlayer(true);
        Engine.play();
    },

    play: () => {
        window.speechSynthesis.cancel();
        if(State.cursor >= State.sentences.length) {
            State.playing = false;
            UI.updateUI();
            return;
        }

        const text = State.sentences[State.cursor].trim();
        if(!text) { State.cursor++; Engine.play(); return; }

        const ut = new SpeechSynthesisUtterance(text);
        ut.voice = State.voices[document.getElementById('voice-select').value] || State.voices[0];
        ut.rate = State.tempo;

        ut.onboundary = (e) => {
            if(e.name === 'word') UI.highlight(text, e.charIndex, e.charLength);
        };

        ut.onend = () => {
            if(State.playing) {
                State.cursor++;
                Engine.save();
                Engine.play();
            }
        };

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: State.curr.title,
                artist: 'Scribe Titan Engine',
                album: 'Local Reader'
            });
        }

        window.speechSynthesis.speak(ut);
        State.playing = true;
        UI.updateUI();
    },

    toggle: () => {
        Haptics.impact();
        if(State.playing) {
            window.speechSynthesis.pause();
            State.playing = false;
        } else {
            window.speechSynthesis.paused ? window.speechSynthesis.resume() : Engine.play();
            State.playing = true;
        }
        UI.updateUI();
    },

    next: () => { State.cursor++; Engine.play(); },
    prev: () => { State.cursor = Math.max(0, State.cursor - 1); Engine.play(); },
    skip: (n) => { State.cursor = Math.max(0, Math.min(State.sentences.length-1, State.cursor + n)); Engine.play(); },

    tempo: () => {
        const steps = [1.0, 1.2, 1.5, 2.0, 0.8];
        State.tempo = steps[(steps.indexOf(State.tempo) + 1) % steps.length];
        document.getElementById('rate-ui').textContent = State.tempo + 'x';
        if(State.playing) Engine.play();
    },

    save: async () => {
        const idx = State.lib.findIndex(d => d.id === State.curr.id);
        if(idx !== -1) {
            State.lib[idx].cursor = State.cursor;
            await localforage.setItem('titan_archive', State.lib);
        }
    }
};

const UI = {
    render: (query = "") => {
        const grid = document.getElementById('library');
        const filtered = State.lib.filter(d => d.title.toLowerCase().includes(query.toLowerCase()));
        
        grid.innerHTML = filtered.map(doc => `
            <div class="card" onclick="Engine.load(${doc.id})">
                <button class="btn delete-trigger" onclick="App.delete(${doc.id}, event)"><i class="ph-bold ph-x"></i></button>
                <div class="cover"><i class="ph-fill ph-file-text"></i></div>
                <div class="title">${doc.title}</div>
            </div>
        `).join('');
    },

    setupVoices: () => {
        const sel = document.getElementById('voice-select');
        sel.innerHTML = State.voices
            .map((v, i) => `<option value="${i}">${v.name.split(' (')[0]}</option>`)
            .join('');
    },

    highlight: (text, idx, len) => {
        const pre = text.substring(0, idx);
        const word = text.substring(idx, idx + len);
        const post = text.substring(idx + len);
        document.getElementById('live-caption').innerHTML = `${pre}<span class="active-word">${word}</span>${post}`;
    },

    updateUI: () => {
        const icon = State.playing ? 'ph-fill ph-pause-circle' : 'ph-fill ph-play-circle';
        const mIcon = State.playing ? 'ph-fill ph-pause' : 'ph-fill ph-play';
        document.getElementById('play-btn').innerHTML = `<i class="${icon}"></i>`;
        document.getElementById('mini-play-btn').innerHTML = `<i class="${mIcon}"></i>`;
        
        const pct = Math.round((State.cursor / State.sentences.length) * 100) || 0;
        document.getElementById('bar-fill').style.width = pct + '%';
        document.getElementById('pos-index').textContent = `Sentence ${State.cursor}`;
        document.getElementById('pos-percent').textContent = pct + '%';
        
        document.getElementById('mini-title').textContent = State.curr ? State.curr.title : 'Nothing Loaded';
        document.getElementById('mini-status').textContent = `${pct}% completed`;
        document.getElementById('player-title').textContent = State.curr?.title;
    },

    togglePlayer: (open) => {
        const p = document.getElementById('player');
        const m = document.getElementById('mini-player');
        if(open) {
            p.style.display = 'flex';
            setTimeout(() => p.classList.add('active'), 10);
            m.style.display = 'none';
        } else {
            p.classList.remove('active');
            setTimeout(() => {
                p.style.display = 'none';
                m.style.display = 'flex';
            }, 400);
        }
    },

    bindGestures: () => {
        let startY = 0;
        const area = document.getElementById('swipe-area');
        area.addEventListener('touchstart', e => startY = e.touches[0].clientY);
        area.addEventListener('touchend', e => {
            const endY = e.changedTouches[0].clientY;
            if(endY - startY > 100) UI.togglePlayer(false);
        });
    },

    sleepTimer: () => {
        Haptics.impact();
        const mins = prompt("Minutes until sleep?", "15");
        if(mins) {
            alert(`Timer set for ${mins}m`);
            setTimeout(() => {
                window.speechSynthesis.cancel();
                State.playing = false;
                UI.updateUI();
            }, mins * 60000);
        }
    }
};

const Haptics = {
    impact: () => { if(navigator.vibrate) navigator.vibrate(10); }
};

// Register PWA Service Worker for Offline access
if ('serviceWorker' in navigator) {
    const sw = `
        const cacheName = 'titan-v3';
        self.addEventListener('install', e => e.waitUntil(caches.open(cacheName).then(c => c.addAll(['.']))));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
    `;
    const blob = new Blob([sw], {type: 'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}

App.init();
</script>
</body>
</html>
